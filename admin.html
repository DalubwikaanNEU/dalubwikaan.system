<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Dalubwikaan Admin Treasury
</title>


<link rel="stylesheet" href="css/style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>



<body>



<div class="dashboard">





<!-- SIDEBAR -->

<aside class="sidebar">


<h2>
📚 Dalubwikaan
</h2>


<p>
Treasurer Panel
</p>




<nav>


<a href="index.html">

🏠 Dashboard

</a>



<a class="active">

⚙ Admin Panel

</a>



<a id="logout">

🚪 Logout

</a>



</nav>


</aside>









<!-- MAIN CONTENT -->

<main class="main">





<header>


<div>

<h1>
Treasury Management
</h1>


<p>
Manage collections, projects, and expenses
</p>


</div>



</header>









<!-- ADD COLLECTION -->

<section class="panel">


<h2>
💰 Add Weekly Collection
</h2>



<form id="collectionForm">


<label>
Year Level
</label>


<select id="yearLevel">


<option>
First Year
</option>


<option>
Second Year
</option>


<option>
Third Year
</option>


<option>
Fourth Year
</option>


</select>





<label>
Amount Collected
</label>


<input 
type="number"
id="amount"
placeholder="Enter amount">





<label>
Collection Date
</label>


<input 
type="date"
id="date">





<button type="submit">

Add Collection

</button>



</form>


</section>









<!-- PROJECT -->

<section class="panel">


<h2>
🏗 Add Organization Project
</h2>




<form id="projectForm">



<label>
Project Name
</label>


<input
type="text"
id="projectName"
placeholder="Example: Gabay Turo sa Lingguwistika">





<label>
Project Budget
</label>


<input
type="number"
id="projectBudget"
placeholder="Budget">





<label>
Project Description
</label>


<textarea 
id="description"
placeholder="Describe the project">
</textarea>




<button type="submit">

Save Project

</button>



</form>



</section>









<!-- EXPENSE WITH RECEIPT -->

<section class="panel">


<h2>
💸 Add Expense With Receipt
</h2>




<form id="expenseForm">





<label>
Project Name
</label>


<input
type="text"
id="expenseProject"
placeholder="Example: Poetry Competition">






<label>
Expense Amount
</label>


<input
type="number"
id="expenseAmount"
placeholder="Enter expense">






<label>
Expense Description
</label>


<textarea
id="expenseDescription"
placeholder="Food, materials, certificates...">
</textarea>







<label>
Upload Receipt
</label>


<input
type="file"
id="receiptFile"
accept="image/*">





<button type="submit">

Save Expense

</button>




</form>


</section>









<!-- RECORDS -->

<section class="panel">


<h2>
📋 Treasury Records
</h2>





<table>


<thead>


<tr>


<th>
Type
</th>


<th>
Details
</th>


<th>
Amount
</th>



</tr>


</thead>




<tbody id="records">


</tbody>



</table>


</section>









</main>




</div>







<script type="module" src="js/admin.js"></script>



</body>


</html>
