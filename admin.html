<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Dalubwikaan Admin Treasury
</title>


<link rel="stylesheet" href="css/style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>



<body>



<div class="dashboard">





<!-- SIDEBAR -->

<aside class="sidebar">


<h2>
📚 Dalubwikaan
</h2>


<p>
Treasury Admin Panel
</p>




<nav>


<a href="index.html">

🏠 Dashboard

</a>




<a class="active">

⚙ Admin Panel

</a>




<a id="logout">

🚪 Logout

</a>



</nav>



</aside>









<!-- MAIN CONTENT -->

<main class="main">





<header>


<div>

<h1>
Treasurer Control Panel
</h1>


<p>
Manage collections, projects, and organization funds
</p>


</div>



</header>









<!-- COLLECTION FORM -->

<section class="panel">


<h2>
💰 Add Weekly Collection
</h2>




<form id="collectionForm">



<label>
Year Level
</label>



<select id="yearLevel" required>


<option value="First Year">
First Year
</option>


<option value="Second Year">
Second Year
</option>


<option value="Third Year">
Third Year
</option>


<option value="Fourth Year">
Fourth Year
</option>



</select>





<label>
Amount Collected
</label>



<input

type="number"

id="amount"

placeholder="Enter amount"

required

>






<label>
Collection Date
</label>


<input

type="date"

id="date"

required

>







<button type="submit">

Save Collection

</button>




</form>



</section>









<!-- PROJECT FORM -->

<section class="panel">


<h2>
🏗 Add Project Budget
</h2>





<form id="projectForm">





<label>
Project Name
</label>



<input

type="text"

id="projectName"

placeholder="Example: Poetry Competition"

required

>








<label>
Budget Allocation
</label>



<input

type="number"

id="projectBudget"

placeholder="Enter budget"

required

>







<label>
Project Description
</label>



<textarea

id="description"

placeholder="Describe the project"

required

></textarea>







<button type="submit">

Save Project

</button>





</form>



</section>









<!-- RECORDS -->

<section class="panel">



<h2>
📋 Treasury Records
</h2>





<table>



<thead>


<tr>


<th>
Type
</th>



<th>
Details
</th>



<th>
Amount
</th>


</tr>



</thead>





<tbody id="records">



</tbody>





</table>




</section>









</main>



</div>









<script type="module" src="js/admin.js"></script>



</body>


</html>
